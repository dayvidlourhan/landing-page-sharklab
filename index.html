  <script>
    // Sistema de Navegação e Atualização de Dados para Assets Pré-compilados
    document.addEventListener("DOMContentLoaded", () => {
      const applyNavigationIds = () => {
        const sections = document.querySelectorAll('section');
        sections.forEach(section => {
          const text = section.innerText.toLowerCase();
          if (text.includes("nossos serviços")) {
            section.id = "servicos";
          } else if (text.includes("estratégias inteligentes") || text.includes("presença real no digital")) {
            section.id = "sobre";
          } else if (text.includes("plano ideal") || text.includes("escolha o plano")) {
            section.id = "precos";
          } else if (text.includes("dados de verdade") || text.includes("sharklab")) {
            if (!section.id) section.id = "inicio";
          }
          if (section.id) section.style.scrollMarginTop = "80px";
        });
        
        const footer = document.querySelector('footer');
        if (footer) {
          footer.id = "contato";
          footer.style.scrollMarginTop = "80px";
          
          // Patches de Dados no Footer (sem mudar o layout original)
          const footerHtml = footer.innerHTML;
          if (footerHtml.includes("contato@sharklab.com.br") || footerHtml.includes("+55 (11) 99999-9999")) {
            footer.innerHTML = footer.innerHTML
              .replace(/contato@sharklab\.com\.br/g, "agencysharklab@gmail.com")
              .replace(/\+55 \(11\) 99999-9999/g, "+55 (62) 98193-9260")
              .replace(/São Paulo, SP - Brasil/g, "Goiânia, GO - Brasil")
              .replace(/contato@sharklab\.com\.br/g, "agencysharklab@gmail.com");
          }

          // Patch Links Sociais
          const socialContainer = footer.querySelector('.flex.items-center.gap-3');
          if (socialContainer && !socialContainer.dataset.patched) {
            socialContainer.innerHTML = `
              <a href="https://www.instagram.com/sharklaboficial/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" class="w-10 h-10 rounded-full bg-muted flex items-center justify-center text-muted-foreground hover:bg-primary hover:text-primary-foreground transition-all duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-instagram w-4 h-4"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>
              </a>
              <a href="https://wa.me/5562981939260" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp" class="w-10 h-10 rounded-full bg-muted flex items-center justify-center text-muted-foreground hover:bg-primary hover:text-primary-foreground transition-all duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 682 682.667" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M544.387 93.008C484.512 33.063 404.883.035 320.05 0 145.246 0 2.98 142.262 2.91 317.113c-.024 55.895 14.577 110.457 42.331 158.551L.25 640l168.121-44.102c46.324 25.27 98.477 38.586 151.55 38.602h.134c174.785 0 317.066-142.273 317.132-317.133.036-84.742-32.921-164.418-92.8-224.36zM320.05 580.94h-.11c-47.296-.02-93.683-12.73-134.16-36.742l-9.62-5.715-99.766 26.172 26.628-97.27-6.27-9.972c-26.386-41.969-40.32-90.476-40.296-140.281.055-145.332 118.305-263.57 263.7-263.57 70.406.023 136.59 27.476 186.355 77.3s77.156 116.051 77.133 186.485C583.582 462.69 465.34 580.94 320.05 580.94zm144.586-197.418c-7.922-3.968-46.883-23.132-54.149-25.78-7.258-2.645-12.547-3.962-17.824 3.968-5.285 7.93-20.469 25.781-25.094 31.066-4.625 5.29-9.242 5.953-17.168 1.985-7.925-3.965-33.457-12.336-63.726-39.332-23.555-21.012-39.457-46.961-44.082-54.89-4.617-7.938-.04-11.813 3.476-16.173 8.578-10.652 17.168-21.82 19.809-27.105 2.644-5.29 1.32-9.918-.664-13.883-1.977-3.965-17.824-42.969-24.426-58.84-6.437-15.445-12.965-13.36-17.832-13.601-4.617-.231-9.902-.278-15.187-.278-5.282 0-13.868 1.98-21.133 9.918-7.262 7.934-27.73 27.102-27.73 66.106s28.394 76.683 32.355 81.972c3.96 5.29 55.879 85.328 135.367 119.649 18.906 8.172 33.664 13.043 45.176 16.695 18.984 6.031 36.254 5.18 49.91 3.14 15.226-2.277 46.879-19.171 53.488-37.68 6.602-18.51 6.602-34.374 4.617-37.683-1.976-3.304-7.261-5.285-15.183-9.254zm0 0"></path></svg>
              </a>
            `;
            socialContainer.dataset.patched = "true";
          }
        }
      };
      
      // ... resto do script de scroll permanece ...
      const performSmoothScroll = (hash) => {
        if (!hash || hash === "#" || hash === "/") return;
        const id = hash.replace(/^#\/?/, "");
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
          return true;
        }
        return false;
      };

      // Inicialização
      applyNavigationIds();
      [100, 500, 1000, 2000].forEach(t => setTimeout(applyNavigationIds, t));

      document.addEventListener("click", (e) => {
        const link = e.target.closest("a");
        if (!link) return;
        const isHomeLink = link.getAttribute("href") === "/" || link.getAttribute("href") === "#" || link.hash === "#inicio";
        if (isHomeLink && (link.pathname === window.location.pathname || link.pathname === "/")) {
          window.scrollTo({ top: 0, behavior: "smooth" });
          window.history.pushState(null, "", "/");
          e.preventDefault();
          return;
        }
        if (link.hash && (link.pathname === window.location.pathname || link.pathname === "/")) {
          if (performSmoothScroll(link.hash)) {
            window.history.pushState(null, "", link.hash);
            e.preventDefault();
          }
        }
      });
      if (window.location.hash) {
        setTimeout(() => performSmoothScroll(window.location.hash), 1500);
      }
    });
  </script>
