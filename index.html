  <script>
    // Sistema de Navegação para Assets Pré-compilados
    document.addEventListener("DOMContentLoaded", () => {
      const applyNavigationIds = () => {
        const sections = document.querySelectorAll('section');
        sections.forEach(section => {
          const text = section.innerText.toLowerCase();
          if (text.includes("nossos serviços")) {
            section.id = "servicos";
          } else if (text.includes("estratégias inteligentes") || text.includes("presença real no digital")) {
            section.id = "sobre";
          } else if (text.includes("plano ideal") || text.includes("escolha o plano")) {
            section.id = "precos";
          } else if (text.includes("dados de verdade") || text.includes("sharklab")) {
            if (!section.id) section.id = "inicio";
          }
          if (section.id) section.style.scrollMarginTop = "80px";
        });
        
        const footer = document.querySelector('footer');
        if (footer) {
          footer.id = "contato";
          footer.style.scrollMarginTop = "80px";
        }
      };

      // Função de Scroll Suave Manual
      const performSmoothScroll = (hash) => {
        if (!hash || hash === "#" || hash === "/") return;
        const id = hash.replace(/^#\/?/, "");
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
          return true;
        }
        return false;
      };

      // Inicialização
      applyNavigationIds();
      // Reaplica IDs algumas vezes para garantir que o React terminou de renderizar
      [100, 500, 1000, 2000].forEach(t => setTimeout(applyNavigationIds, t));

      // Captura cliques em links de âncora
      document.addEventListener("click", (e) => {
        const link = e.target.closest("a");
        if (!link) return;

        // Caso especial para link de "Início" ou Logo (geralmente href="/" ou "#")
        const isHomeLink = link.getAttribute("href") === "/" || link.getAttribute("href") === "#" || link.hash === "#inicio";
        
        if (isHomeLink && (link.pathname === window.location.pathname || link.pathname === "/")) {
          window.scrollTo({ top: 0, behavior: "smooth" });
          window.history.pushState(null, "", "/");
          e.preventDefault();
          return;
        }

        if (link.hash && (link.pathname === window.location.pathname || link.pathname === "/")) {
          if (performSmoothScroll(link.hash)) {
            // Se conseguimos scrollar, atualizamos o URL sem recarregar
            window.history.pushState(null, "", link.hash);
            e.preventDefault();
          }
        }
      });

      // Scroll inicial se houver hash na URL
      if (window.location.hash) {
        setTimeout(() => performSmoothScroll(window.location.hash), 1500);
      }
    });
  </script>
